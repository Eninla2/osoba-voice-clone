services:
  - type: web
    name: osoba-voice-studio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OSOBA_SECRET
        value: osoba2026
      - key: OSOBA_VOICE
        value: en-GB-RyanNeural
